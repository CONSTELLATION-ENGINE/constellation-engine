name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  stub-smoke:
    name: Public stub smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Stub boot + 503 surface tests
        run: node --test src/tool-observability.test.js
